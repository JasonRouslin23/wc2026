<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC2026 — Bracket Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:    #53d6dc;
  --teal-dim: rgba(83,214,220,0.12);
  --bg:      #08111a;
  --surface: #0f2030;
  --card:    #112233;
  --border:  #1a3048;
  --border2: #254560;
  --text:    #e2f4f5;
  --muted:   #5a8a92;
  --gold:    #f4c842;
  --green:   #4ade80;
  --red:     #f87171;
  --silver:  #94a3b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,17,26,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 56px;
}
.nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.1em; }
.nav-logo span { color: var(--teal); }
.nav-tabs { display: flex; gap: 0.25rem; }
.nav-tab {
  background: none; border: none; color: var(--muted);
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.nav-tab:hover { color: var(--text); background: var(--surface); }
.nav-tab.active { color: var(--teal); background: var(--teal-dim); }

/* ── LAYOUT ── */
.page { display: flex; flex-direction: column; min-height: calc(100vh - 56px); }

.main-col {
  flex: 1; min-width: 0; overflow-x: auto;
  padding: 1.5rem;
  padding-bottom: 56px;
}

/* ── BET SLIP - BOTTOM COLLAPSIBLE ── */
.slip-col {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--card); border-top: 2px solid var(--teal);
  transition: height 0.3s ease;
  height: 48px;
  position: fixed;
}

.slip-col.expanded { height: 340px; }

.slip-header {
  padding: 0 1.5rem;
  height: 48px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
  border-bottom: 1px solid var(--border);
}

.slip-header:hover { background: rgba(83,214,220,0.04); }

.slip-header-left {
  display: flex; align-items: center; gap: 0.75rem;
}

.slip-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem; letter-spacing: 0.08em; color: var(--text);
}

.slip-count {
  background: var(--teal); color: #08111a;
  font-size: 0.68rem; font-weight: 700;
  padding: 0.12rem 0.5rem; border-radius: 100px;
}

.slip-combined {
  font-family: 'DM Mono', monospace; font-size: 0.82rem;
  color: var(--teal); font-weight: 600;
}

.slip-toggle {
  font-size: 0.75rem; color: var(--muted); transition: transform 0.3s;
}
.slip-col.expanded .slip-toggle { transform: rotate(180deg); }

.slip-body {
  display: none; height: calc(340px - 48px);
  flex-direction: row; overflow: hidden;
}

.slip-col.expanded .slip-body { display: flex; }

.slip-legs {
  flex: 1; overflow-x: auto; overflow-y: hidden;
  display: flex; gap: 0.5rem; align-items: flex-start;
  padding: 0.75rem 1rem;
}

.slip-leg {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 0.6rem 0.75rem;
  min-width: 160px; max-width: 180px; flex-shrink: 0;
  position: relative;
}

.slip-leg-team {
  font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 0.4rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.slip-leg-desc { font-size: 0.68rem; color: var(--muted); margin-top: 0.2rem; line-height: 1.3; }

.slip-leg-odds {
  font-family: 'DM Mono', monospace; font-size: 0.8rem;
  color: var(--teal); font-weight: 600; margin-top: 0.3rem;
}

.slip-leg-remove {
  position: absolute; top: 0.3rem; right: 0.3rem;
  background: none; border: none; color: var(--muted);
  cursor: pointer; font-size: 0.7rem; padding: 0.1rem 0.25rem;
  border-radius: 3px; transition: all 0.15s;
}
.slip-leg-remove:hover { color: var(--red); background: rgba(248,113,113,0.1); }

.slip-actions {
  display: flex; flex-direction: column; justify-content: center;
  gap: 0.5rem; padding: 0.75rem; border-left: 1px solid var(--border);
  min-width: 160px;
}

.slip-total-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.72rem; color: var(--muted);
}
.slip-total-row.big { color: var(--text); font-weight: 600; }
.slip-total-row.big span:last-child { color: var(--teal); font-family: 'DM Mono', monospace; }

.slip-btn {
  padding: 0.6rem 1rem;
  background: var(--teal); color: #08111a;
  border: none; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
  transition: all 0.2s;
}
.slip-btn:hover { background: #6ee7ed; }
.slip-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

.slip-clear {
  padding: 0.4rem;
  background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 6px; font-size: 0.72rem; cursor: pointer; transition: all 0.2s;
}
.slip-clear:hover { border-color: var(--red); color: var(--red); }

/* ── PHASE TABS ── */
.phase-tabs {
  display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;
}

.phase-tab {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem; font-weight: 500; letter-spacing: 0.05em;
  text-transform: uppercase; padding: 0.4rem 1rem; border-radius: 6px;
  cursor: pointer; transition: all 0.2s;
}
.phase-tab:hover { color: var(--text); }
.phase-tab.active { color: var(--teal); border-color: var(--teal); background: var(--teal-dim); }
.phase-tab.locked { opacity: 0.4; cursor: not-allowed; }

/* ── GROUP STAGE ── */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
}

.next-phase-container {
  position: fixed;
  right: clamp(0.75rem, 2vw, 1.5rem);
  bottom: calc(48px + env(safe-area-inset-bottom, 0px) + 0.85rem);
  z-index: 120;
}

.next-phase-btn {
  background: var(--teal);
  color: #08111a;
  border: none;
  padding: 0.75rem 2rem;
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.group-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}

.group-card-header {
  background: var(--surface); padding: 0.5rem 0.9rem;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.group-card-letter {
  font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
  letter-spacing: 0.08em; color: var(--teal);
}

.group-card-status { font-size: 0.65rem; color: var(--muted); }

.group-team-row {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.55rem 0.9rem; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s; position: relative;
}
.group-team-row:last-child { border-bottom: none; }
.group-team-row:hover { background: rgba(83,214,220,0.04); }

.group-team-row.picked-1st { background: rgba(244,200,66,0.08); border-left: 3px solid var(--gold); }
.group-team-row.picked-2nd { background: rgba(148,163,184,0.08); border-left: 3px solid var(--silver); }
.group-team-row.picked-3rd { background: rgba(83,214,220,0.05); border-left: 3px solid rgba(83,214,220,0.3); }

.group-team-flag { font-size: 1.1rem; line-height: 1; }

.group-team-info { flex: 1; min-width: 0; }

.group-team-name {
  font-size: 0.82rem; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.group-team-rating {
  font-size: 0.65rem; color: var(--muted);
  font-family: 'DM Mono', monospace;
}

.group-team-badge {
  font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
  padding: 0.15rem 0.45rem; border-radius: 4px;
}

.badge-1st { background: rgba(244,200,66,0.15); color: var(--gold); }
.badge-2nd { background: rgba(148,163,184,0.12); color: var(--silver); }
.badge-3rd { background: rgba(83,214,220,0.1); color: var(--teal); }

/* Bet options popup */
.bet-popup {
  position: fixed; z-index: 200;
  background: #0a1820; border: 1px solid var(--border);
  border-radius: 10px; padding: 0.75rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  min-width: 200px;
}

.bet-popup-title {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 0.5rem;
  padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
}

.bet-option {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.45rem 0.5rem; border-radius: 6px;
  cursor: pointer; transition: background 0.15s;
  font-size: 0.8rem;
}
.bet-option:hover { background: var(--teal-dim); }
.bet-option-label { font-weight: 500; }
.bet-option-odds { font-family: 'DM Mono', monospace; color: var(--teal); font-size: 0.78rem; }

/* ── THIRD PLACE PICKER ── */
.third-place-section {
  margin-top: 1.5rem;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
}

.third-place-header {
  padding: 0.75rem 1rem; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.third-place-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
  letter-spacing: 0.06em; color: var(--text);
}

.third-place-count {
  font-size: 0.72rem; color: var(--muted);
}

.third-place-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 0.5rem; padding: 0.75rem;
}

.third-place-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 7px; padding: 0.5rem 0.75rem;
  display: flex; align-items: center; gap: 0.5rem;
  cursor: pointer; transition: all 0.2s;
}
.third-place-card:hover { border-color: var(--border2); }
.third-place-card.selected { border-color: var(--teal); background: var(--teal-dim); }
.third-place-card.locked-out { opacity: 0.3; cursor: not-allowed; }

.third-place-flag { font-size: 1rem; }
.third-place-name { font-size: 0.78rem; font-weight: 500; flex: 1; }
.third-place-group { font-size: 0.65rem; color: var(--muted); }

/* ── KNOCKOUT BRACKET ── */
.bracket-container {
  overflow-x: auto; padding-bottom: 1rem;
}

.bracket-rounds {
  display: flex; gap: 0; min-width: 900px;
}

.bracket-round {
  flex: 1; display: flex; flex-direction: column;
  justify-content: space-around; padding: 0 0.5rem;
}

.round-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem;
  letter-spacing: 0.1em; color: var(--muted); text-align: center;
  text-transform: uppercase; margin-bottom: 0.5rem;
  padding-bottom: 0.4rem; border-bottom: 1px solid var(--border);
}

.bracket-match {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; margin: 0.25rem 0;
  min-width: 160px;
}

.bracket-team {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.45rem 0.6rem; cursor: pointer; transition: all 0.15s;
  border-bottom: 1px solid var(--border); position: relative;
}
.bracket-team:last-child { border-bottom: none; }
.bracket-team:hover { background: rgba(83,214,220,0.06); }
.bracket-team.winner { background: rgba(83,214,220,0.1); }
.bracket-team.winner .bracket-team-name { color: var(--teal); font-weight: 600; }
.bracket-team.tbd { opacity: 0.4; cursor: default; }

.bracket-team-flag { font-size: 0.9rem; line-height: 1; }
.bracket-team-name { font-size: 0.75rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bracket-team-rating { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); }

/* ── OPTIMIZER DRAWER (legacy) ── */
.optimizer-drawer {
  position: fixed; bottom: 48px; left: 0; right: 0; z-index: 99;
  background: #0a1820; border-top: 1px solid var(--border);
  transform: translateY(100%); transition: transform 0.3s ease;
  max-height: 70vh; overflow-y: auto;
}
.optimizer-drawer.open { transform: translateY(0); }

.optimizer-inner { padding: 1.5rem; max-width: 900px; margin: 0 auto; }

.optimizer-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
  letter-spacing: 0.06em; color: var(--text); margin-bottom: 0.25rem;
}
.optimizer-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.5rem; }

.optimizer-controls {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.25rem;
  margin-bottom: 1.5rem;
}

.optimizer-control-group { }

.optimizer-control-label {
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--muted); margin-bottom: 0.5rem;
}

/* Leg count slider */
.legs-slider {
  width: 100%; accent-color: var(--teal);
  height: 4px; cursor: pointer;
}

.legs-val {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
  color: var(--teal); margin-left: 0.5rem;
}

/* Bet type toggles */
.toggle-group { display: flex; gap: 0.5rem; flex-wrap: wrap; }

.toggle-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-size: 0.75rem; font-weight: 500;
  padding: 0.35rem 0.75rem; border-radius: 6px; cursor: pointer;
  transition: all 0.15s;
}
.toggle-btn.on { color: var(--teal); border-color: var(--teal); background: var(--teal-dim); }

/* Mode buttons */
.mode-group { display: flex; gap: 0.5rem; flex-direction: column; }

.mode-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-size: 0.75rem; font-weight: 500;
  padding: 0.4rem 0.75rem; border-radius: 6px; cursor: pointer;
  transition: all 0.15s; text-align: left;
}
.mode-btn.on { color: var(--text); border-color: var(--teal); background: var(--teal-dim); }

.generate-btn {
  width: 100%; padding: 0.85rem;
  background: var(--teal); color: #08111a;
  border: none; border-radius: 8px;
  font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase;
  transition: all 0.2s; margin-bottom: 1.25rem;
}
.generate-btn:hover { background: #6ee7ed; }

/* Generated parlay */
.generated-parlay {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}

.parlay-header {
  padding: 0.75rem 1rem; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.parlay-header-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem;
  letter-spacing: 0.06em;
}

.parlay-odds-big {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--teal);
}

.parlay-legs-list { }

.parlay-leg-row {
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.55rem 1rem; border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
}
.parlay-leg-row:last-child { border-bottom: none; }

.parlay-leg-flag { font-size: 1rem; }
.parlay-leg-info { flex: 1; }
.parlay-leg-team { font-weight: 500; }
.parlay-leg-bet { font-size: 0.68rem; color: var(--muted); }
.parlay-leg-odds-val { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--teal); }

.parlay-actions {
  display: flex; gap: 0.75rem; padding: 0.75rem 1rem;
  border-top: 1px solid var(--border); background: var(--surface);
}

.parlay-action-btn {
  flex: 1; padding: 0.6rem;
  border: 1px solid var(--border); background: none; color: var(--text);
  border-radius: 7px; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
}
.parlay-action-btn:hover { border-color: var(--teal); color: var(--teal); }
.parlay-action-btn.primary { background: var(--teal); color: #08111a; border-color: var(--teal); font-weight: 700; }
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 4rem; color: var(--muted); font-size: 0.82rem; gap: 0.75rem;
}
.spinner {
  width: 15px; height: 15px; border: 2px solid var(--border2);
  border-top-color: var(--teal); border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
.slip-legs::-webkit-scrollbar { width: 3px; }
.slip-legs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── PARLAY OPTIMIZER ── */
.optimizer-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
}
.optimizer-modal-panel {
  background: #0a1820; border: 1px solid var(--border);
  border-top: 2px solid var(--teal); border-radius: 12px 12px 0 0;
  width: 100%; max-width: 640px; padding: 1.5rem;
  animation: slideUp 0.3s ease; max-height: 90vh; overflow-y: auto;
}
@keyframes slideUp { from { transform: translateY(40px); opacity:0; } to { transform: translateY(0); opacity:1; } }
.opt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.opt-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 0.06em; }
.opt-close { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; }
.opt-close:hover { color: var(--text); }
.opt-section { margin-bottom: 1.25rem; }
.opt-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 0.6rem; display: flex; justify-content: space-between; }
.opt-label span { color: var(--teal); font-family: 'DM Mono', monospace; }
.bet-type-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.bet-type-toggle { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: 0.78rem; font-weight: 500; padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; user-select: none; }
.bet-type-toggle.on { color: var(--teal); border-color: var(--teal); background: var(--teal-dim); }
.mix-row { display: grid; grid-template-columns: 80px 1fr 44px; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; }
.mix-label { font-size: 0.75rem; font-weight: 600; }
.mix-label.safe { color: var(--green); }
.mix-label.value { color: var(--gold); }
.mix-label.longshot { color: var(--red); }
.mix-slider { width: 100%; cursor: pointer; height: 4px; }
.mix-slider.safe-s  { accent-color: var(--green); }
.mix-slider.value-s { accent-color: var(--gold); }
.mix-slider.long-s  { accent-color: var(--red); }
.mix-pct { font-family: 'DM Mono', monospace; font-size: 0.75rem; text-align: right; }
.mix-total { font-size: 0.7rem; text-align: right; font-family: 'DM Mono', monospace; margin-top: 0.25rem; }
.mix-total.ok { color: var(--green); } .mix-total.warn { color: var(--red); }
.opt-result { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; margin-top: 0.75rem; }
.opt-result-leg { display: flex; align-items: center; gap: 0.6rem; font-size: 0.8rem; padding: 0.3rem 0; border-bottom: 1px solid rgba(26,48,72,0.5); }
.opt-result-leg:last-child { border-bottom: none; }
.opt-result-leg-type { font-size: 0.6rem; padding: 0.1rem 0.35rem; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
.leg-type-safe { background: rgba(74,222,128,0.12); color: var(--green); }
.leg-type-value { background: rgba(244,200,66,0.12); color: var(--gold); }
.leg-type-long { background: rgba(248,113,113,0.12); color: var(--red); }
.opt-result-odds { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--teal); margin-left: auto; flex-shrink: 0; }
.opt-summary { display: flex; justify-content: space-between; align-items: center; padding-top: 0.6rem; border-top: 1px solid var(--border); margin-top: 0.5rem; }

<script>
// ── OPTIMIZER ──────────────────────────────────────────────────────────────────

const betTypeState = { advance: true, wingroup: false };
let lastMixChanged = null;

function openOptimizer(event) {
  if (event) event.stopPropagation();
  // Clear any pending hideBetPopup listeners first
  hideBetPopup();
  const overlay = document.getElementById('optimizer-overlay');
  overlay.style.display = 'flex';
  // Hide "Win Group" toggle in knockout stages
  const wingroupToggle = document.getElementById('toggle-wingroup');
  const isKnockout = ['r32','r16','qf','sf','final'].includes(currentPhase);
  wingroupToggle.style.display = isKnockout ? 'none' : '';
  if (isKnockout) {
    betTypeState.wingroup = false;
    wingroupToggle.classList.remove('on');
  }
}

function closeOptimizer(e) {
  if (!e || e.target === document.getElementById('optimizer-overlay')) {
    document.getElementById('optimizer-overlay').style.display = 'none';
  }
}

function toggleBetType(type) {
  betTypeState[type] = !betTypeState[type];
  // Ensure at least one is on
  if (!betTypeState.advance && !betTypeState.wingroup) {
    betTypeState[type] = true;
    return;
  }
  document.getElementById(`toggle-${type}`).classList.toggle('on', betTypeState[type]);
}

function updateMix(changed) {
  const safe  = parseInt(document.getElementById('mix-safe').value);
  const value = parseInt(document.getElementById('mix-value').value);
  const long  = parseInt(document.getElementById('mix-long').value);
  const total = safe + value + long;

  document.getElementById('pct-safe').textContent  = safe + '%';
  document.getElementById('pct-value').textContent = value + '%';
  document.getElementById('pct-long').textContent  = long + '%';
  document.getElementById('mix-total-display').textContent = total + '%';

  const statusEl = document.getElementById('mix-total-status');
  if (total === 100) {
    statusEl.textContent = '✓ Total: 100%';
    statusEl.className = 'mix-total ok';
  } else {
    statusEl.textContent = `Total: ${total}% (must equal 100%)`;
    statusEl.className = 'mix-total warn';
  }
}

function generateParlay() {
  const legs     = parseInt(document.getElementById('opt-legs').value);
  const safePct  = parseInt(document.getElementById('mix-safe').value);
  const valuePct = parseInt(document.getElementById('mix-value').value);
  const longPct  = parseInt(document.getElementById('mix-long').value);
  const total = safePct + valuePct + longPct;

  if (total !== 100) {
    alert('Odds mix must total 100%');
    return;
  }

  // Build pool of all picks from bracket
  const pool = [];

  // Collect all teams picked to advance (1st + 2nd from groups + 3rd picks)
  groupsData.forEach(g => {
    const picks = groupPicks[g.name] || {};
    if (betTypeState.advance) {
      if (picks.first)  pool.push({team: picks.first,  desc: `Advance from Group ${g.name}`, type: 'advance', pct: rankingsData[picks.first.id]?.advance_pct});
      if (picks.second) pool.push({team: picks.second, desc: `Advance from Group ${g.name}`, type: 'advance', pct: rankingsData[picks.second.id]?.advance_pct});
    }
    if (betTypeState.wingroup) {
      if (picks.first)  pool.push({team: picks.first, desc: `Win Group ${g.name}`, type: 'wingroup', pct: (rankingsData[picks.first.id]?.advance_pct || 50) * 0.45});
    }
  });

  // Also add knockout picks
  Object.entries(knockoutPicks).forEach(([matchId, team]) => {
    const pr = rankingsData[team.id] || {};
    const phaseMap = {
      r32: {desc: 'Advance to R16', pct: pr.advance_pct},
      r16: {desc: 'Reach QF', pct: pr.qf_pct},
      qf:  {desc: 'Reach Semis', pct: pr.semi_pct},
      sf:  {desc: 'Reach Final', pct: pr.final_pct},
      final: {desc: 'Win World Cup', pct: pr.win_pct},
    };
    for (const [phase, info] of Object.entries(phaseMap)) {
      if (matchId.startsWith(phase) || matchId === 'final') {
        if (betTypeState.advance) {
          pool.push({team, desc: info.desc, type: 'advance', pct: info.pct});
        }
        break;
      }
    }
  });

  if (!pool.length) {
    document.getElementById('opt-result').innerHTML = '<div style="color:var(--muted);font-size:0.8rem;padding:0.5rem">Complete the bracket first to generate a parlay.</div>';
    document.getElementById('opt-result').style.display = 'block';
    return;
  }

  // Classify each leg by odds tier
  // Safe: pct > 60, Value: 25-60, Long: < 25
  const classify = (pct) => {
    if (!pct) return 'value';
    if (pct > 60) return 'safe';
    if (pct >= 25) return 'value';
    return 'long';
  };

  pool.forEach(p => { p.tier = classify(p.pct); p.odds = probToAmerican(p.pct); });

  // Determine how many of each tier we need
  const nSafe  = Math.round(legs * safePct  / 100);
  const nValue = Math.round(legs * valuePct / 100);
  const nLong  = legs - nSafe - nValue;

  const safePool  = pool.filter(p => p.tier === 'safe').sort((a,b) => (b.pct||0)-(a.pct||0));
  const valuePool = pool.filter(p => p.tier === 'value').sort((a,b) => (b.pct||0)-(a.pct||0));
  const longPool  = pool.filter(p => p.tier === 'long').sort((a,b) => (a.pct||0)-(b.pct||0));

  // Deduplicate by team+desc
  const seen = new Set();
  const pick = (arr, n) => {
    const out = [];
    for (const p of arr) {
      if (out.length >= n) break;
      const key = `${p.team.id}-${p.desc}`;
      if (!seen.has(key)) { seen.add(key); out.push(p); }
    }
    return out;
  };

  let selected = [
    ...pick(safePool, nSafe),
    ...pick(valuePool, nValue),
    ...pick(longPool, Math.max(0, nLong)),
  ];

  // Fill remaining slots from any pool if we're short
  if (selected.length < legs) {
    const remaining = pool.filter(p => {
      const key = `${p.team.id}-${p.desc}`;
      return !seen.has(key);
    }).sort((a,b) => (b.pct||0)-(a.pct||0));
    selected = [...selected, ...pick(remaining, legs - selected.length)];
  }

  // Render result
  const tierLabel = (tier) => {
    if (tier === 'safe') return '<span class="opt-result-leg-type leg-type-safe">SAFE</span>';
    if (tier === 'value') return '<span class="opt-result-leg-type leg-type-value">VALUE</span>';
    return '<span class="opt-result-leg-type leg-type-long">LONG</span>';
  };

  const combined = combinedOdds(selected.filter(p => p.odds));
  const combinedStr = combined ? formatOdds(combined) : '—';
  let payout = '—';
  if (combined) {
    const p = combined < 0 ? 100/(-combined) : combined/100;
    payout = `$${(100*p+100).toFixed(0)}`;
  }

  document.getElementById('opt-result').style.display = 'block';
  document.getElementById('opt-result').innerHTML = `
    <div class="opt-result">
      <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.6rem">${selected.length} Legs Generated</div>
      ${selected.map(p => `
        <div class="opt-result-leg">
          ${flag(p.team.country_code)} ${p.team.name}
          ${tierLabel(p.tier)}
          <span style="font-size:0.7rem;color:var(--muted);flex:1;margin-left:0.3rem">${p.desc}</span>
          <span class="opt-result-odds">${p.odds ? formatOdds(p.odds) : '—'}</span>
        </div>
      `).join('')}
      <div class="opt-summary">
        <div>
          <div class="opt-combined">${combinedStr}</div>
          <div class="opt-payout">$100 returns ${payout}</div>
        </div>
        <button class="opt-add-btn" onclick="addParlayToSlip(${JSON.stringify(selected).replace(/"/g,'&quot;')})">
          Add to Slip →
        </button>
      </div>
    </div>
  `;
}

function addParlayToSlip(legs) {
  legs.forEach(leg => {
    addToSlip(
      `opt-${leg.team.id}-${leg.desc}`,
      leg.team,
      flag(leg.team.country_code),
      leg.desc,
      leg.odds ? formatOdds(leg.odds) : '—',
      leg.odds
    );
  });
  closeOptimizer();
  document.getElementById('slip-col').classList.add('expanded');
}
</script>

<!-- Bet popup -->

<script>
const API = 'https://wc2026-production-aad7.up.railway.app';

const FLAGS = {
  ESP:'🇪🇸',FRA:'🇫🇷',ENG:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',BRA:'🇧🇷',ARG:'🇦🇷',GER:'🇩🇪',POR:'🇵🇹',
  NED:'🇳🇱',BEL:'🇧🇪',NOR:'🇳🇴',MAR:'🇲🇦',COL:'🇨🇴',JPN:'🇯🇵',USA:'🇺🇸',
  SUI:'🇨🇭',CHE:'🇨🇭',MEX:'🇲🇽',URU:'🇺🇾',CRO:'🇭🇷',SEN:'🇸🇳',TUR:'🇹🇷',
  SWE:'🇸🇪',ECU:'🇪🇨',AUT:'🇦🇹',PAR:'🇵🇾',CAN:'🇨🇦',SCO:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',CIV:'🇨🇮',
  EGY:'🇪🇬',CZE:'🇨🇿',ALG:'🇩🇿',IRN:'🇮🇷',AUS:'🇦🇺',TUN:'🇹🇳',KOR:'🇰🇷',
  BIH:'🇧🇦',COD:'🇨🇩',SAU:'🇸🇦',NZL:'🇳🇿',QAT:'🇶🇦',CPV:'🇨🇻',CUW:'🇨🇼',
  HTI:'🇭🇹',IRQ:'🇮🇶',JOR:'🇯🇴',PAN:'🇵🇦',UZB:'🇺🇿',ZAF:'🇿🇦',GHA:'🇬🇭',DEU:'🇩🇪',
};
const flag = c => FLAGS[c?.toUpperCase()] || '🌍';

// State
let groupsData = [];
let rankingsData = {};
let groupPicks = {}; // groupLetter -> {first: team, second: team, third: team}
let thirdPicks = []; // array of team ids selected as best 3rd
let knockoutPicks = {}; // matchId -> winning team
let betSlip = []; // array of {id, team, desc, odds, american}
let currentPhase = 'groups';

// R32 bracket structure (fixed by FIFA)
const R32_MATCHES = [
  {id:'m73', label:'Match 73', home:{type:'runner-up', group:'A'}, away:{type:'runner-up', group:'B'}},
  {id:'m74', label:'Match 74', home:{type:'winner', group:'E'}, away:{type:'best3rd', groups:['A','B','C','D','F']}},
  {id:'m75', label:'Match 75', home:{type:'winner', group:'F'}, away:{type:'runner-up', group:'C'}},
  {id:'m76', label:'Match 76', home:{type:'winner', group:'C'}, away:{type:'runner-up', group:'F'}},
  {id:'m77', label:'Match 77', home:{type:'winner', group:'I'}, away:{type:'best3rd', groups:['C','D','F','G','H']}},
  {id:'m78', label:'Match 78', home:{type:'runner-up', group:'E'}, away:{type:'runner-up', group:'I'}},
  {id:'m79', label:'Match 79', home:{type:'winner', group:'A'}, away:{type:'best3rd', groups:['C','E','F','H','I']}},
  {id:'m80', label:'Match 80', home:{type:'winner', group:'L'}, away:{type:'best3rd', groups:['E','H','I','J','K']}},
  {id:'m81', label:'Match 81', home:{type:'winner', group:'D'}, away:{type:'best3rd', groups:['B','E','F','I','J']}},
  {id:'m82', label:'Match 82', home:{type:'winner', group:'G'}, away:{type:'best3rd', groups:['A','E','H','I','J']}},
  {id:'m83', label:'Match 83', home:{type:'runner-up', group:'K'}, away:{type:'runner-up', group:'L'}},
  {id:'m84', label:'Match 84', home:{type:'winner', group:'H'}, away:{type:'runner-up', group:'J'}},
  {id:'m85', label:'Match 85', home:{type:'winner', group:'B'}, away:{type:'best3rd', groups:['E','F','G','I','J']}},
  {id:'m86', label:'Match 86', home:{type:'winner', group:'J'}, away:{type:'runner-up', group:'H'}},
  {id:'m87', label:'Match 87', home:{type:'winner', group:'K'}, away:{type:'best3rd', groups:['D','E','I','J','L']}},
  {id:'m88', label:'Match 88', home:{type:'runner-up', group:'D'}, away:{type:'runner-up', group:'G'}},
];

// R16 pairings (winners of R32 matches)
const R16_MATCHES = [
  {id:'r16_1', home:'m79', away:'m73'},
  {id:'r16_2', home:'m74', away:'m75'},
  {id:'r16_3', home:'m77', away:'m78'},
  {id:'r16_4', home:'m76', away:'m82'},
  {id:'r16_5', home:'m81', away:'m88'},
  {id:'r16_6', home:'m80', away:'m83'},
  {id:'r16_7', home:'m85', away:'m84'},
  {id:'r16_8', home:'m86', away:'m87'},
];

const QF_MATCHES = [
  {id:'qf1', home:'r16_1', away:'r16_2'},
  {id:'qf2', home:'r16_3', away:'r16_4'},
  {id:'qf3', home:'r16_5', away:'r16_6'},
  {id:'qf4', home:'r16_7', away:'r16_8'},
];

const SF_MATCHES = [
  {id:'sf1', home:'qf1', away:'qf2'},
  {id:'sf2', home:'qf3', away:'qf4'},
];

const FINAL_MATCH = {id:'final', home:'sf1', away:'sf2'};

// Convert probability to American odds
function probToAmerican(pct) {
  if (!pct || pct <= 0) return null;
  const p = pct / 100;
  if (p >= 0.5) return Math.round(-(p / (1-p)) * 100);
  return Math.round(((1-p) / p) * 100);
}

function formatOdds(american) {
  if (!american) return '—';
  return american > 0 ? `+${american}` : `${american}`;
}

function combinedOdds(legs) {
  if (!legs.length) return null;
  let mult = 1;
  for (const leg of legs) {
    if (!leg.odds) continue;
    const a = leg.odds;
    const p = a < 0 ? (-a)/(-a+100) : 100/(a+100);
    mult *= (1/p);
  }
  const combined_p = 1/mult;
  return probToAmerican(combined_p * 100);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const [gRes, rRes] = await Promise.all([
    fetch(`${API}/api/groups`),
    fetch(`${API}/api/power-rankings`)
  ]);
  groupsData = await gRes.json();
  const rankings = await rRes.json();
  rankings.forEach(r => { rankingsData[r.id] = r; });
  renderGroups();
}

// ── PHASE NAV ─────────────────────────────────────────────────────────────────
function showPhase(phase) {
  const tab = document.getElementById(`tab-${phase}`);
  if (tab.classList.contains('locked')) return;
  currentPhase = phase;
  document.querySelectorAll('.phase-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  ['groups','third','r32','r16','qf','sf','final'].forEach(p => {
    document.getElementById(`phase-${p}`).style.display = p === phase ? 'block' : 'none';
  });
}

function unlockPhase(phase) {
  const tab = document.getElementById(`tab-${phase}`);
  if (tab) tab.classList.remove('locked');
}

// ── GROUP STAGE ───────────────────────────────────────────────────────────────
function renderGroups() {
  const el = document.getElementById('phase-groups');
  el.innerHTML = `
    <div style="margin-bottom:1rem;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:0.75rem">

        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.9rem;text-align:center">

          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--teal)" id="groups-picked-count">0/12</div>

        <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:0.4rem 0.9rem;text-align:center">
          <div style="font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em">3rd Tagged</div>

    </div>
    <div class="groups-grid">
      ${groupsData.map(g => renderGroupCard(g)).join('')}

    <div class="next-phase-container">

        Next: Best 3rd Place →
      </button>

  `;
}

function renderGroupCard(g) {
  const teams = g.teams || [];
  const picks = groupPicks[g.name] || {};

  const rows = teams.map(t => {
    const pr = rankingsData[t.id] || {};
    const pick = picks.first?.id === t.id ? 'picked-1st' :
                 picks.second?.id === t.id ? 'picked-2nd' :
                 picks.third?.id === t.id ? 'picked-3rd' : '';
    const badge = pick === 'picked-1st' ? '<span class="group-team-badge badge-1st">1st</span>' :
                  pick === 'picked-2nd' ? '<span class="group-team-badge badge-2nd">2nd</span>' :
                  pick === 'picked-3rd' ? '<span class="group-team-badge badge-3rd">3rd</span>' : '';

    return `
      <div class="group-team-row ${pick}">
        <span class="group-team-flag">${flag(t.country_code)}</span>
        <div class="group-team-info" onclick="clickGroupTeam(event, '${g.name}', '${t.id}')" style="flex:1;cursor:pointer">
          <div class="group-team-name">${t.name}</div>
          <div class="group-team-rating">Rating: ${pr.power_rating?.toFixed(1) || '—'}</div>
        </div>
        ${badge}
        <button onclick="event.stopPropagation();openBetPopup(event,'${g.name}','${t.id}')"
          style="background:none;border:1px solid var(--border);color:var(--teal);border-radius:4px;width:22px;height:22px;font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:0.4rem;transition:all 0.15s"
          onmouseover="this.style.background='var(--teal-dim)'" onmouseout="this.style.background='none'">+</button>
      </div>
    `;
  }).join('');

  const complete = picks.first && picks.second;
  return `
    <div class="group-card" id="group-card-${g.name}">
      <div class="group-card-header">
        <span class="group-card-letter">Group ${g.name}</span>
        <span class="group-card-status">${complete ? '✓ Picked' : 'Click to pick'}</span>
      </div>
      ${rows}
    </div>
  `;
}

function openBetPopup(event, groupName, teamId) {
  event.stopPropagation();
  const group = groupsData.find(g => g.name === groupName);
  const team = group.teams.find(t => t.id === teamId);
  const pr = rankingsData[teamId] || {};

  const advPct = pr.advance_pct || 50;
  const winGroupPct = advPct * 0.45;
  const winGroupOdds = formatOdds(probToAmerican(winGroupPct));
  const qualifyOdds  = formatOdds(probToAmerican(advPct));

  document.getElementById('popup-title').textContent = `${flag(team.country_code)} ${team.name}`;
  document.getElementById('popup-options').innerHTML = `
    <div class="bet-option" onclick="addToSlip('${teamId}-win-${groupName}',{id:'${teamId}',name:'${team.name}',country_code:'${team.country_code}'},'${flag(team.country_code)}','Win Group ${groupName}','${winGroupOdds}',${probToAmerican(winGroupPct)});hideBetPopup()">
      <div><div class="bet-option-label">Win Group ${groupName}</div></div>
      <div class="bet-option-odds">${winGroupOdds}</div>
    </div>
    <div class="bet-option" onclick="addToSlip('${teamId}-adv-${groupName}',{id:'${teamId}',name:'${team.name}',country_code:'${team.country_code}'},'${flag(team.country_code)}','Advance from Group ${groupName}','${qualifyOdds}',${probToAmerican(advPct)});hideBetPopup()">
      <div><div class="bet-option-label">Advance from Group ${groupName}</div></div>
      <div class="bet-option-odds">${qualifyOdds}</div>
    </div>
  `;

  const x = Math.min(event.clientX + 10, window.innerWidth - 230);
  const y = Math.min(event.clientY + 10, window.innerHeight - 150);
  const popup = document.getElementById('bet-popup');
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
  popup.style.display = 'block';
  setTimeout(() => document.addEventListener('click', hideBetPopup, {once:true}), 50);
}

function clickGroupTeam(event, groupName, teamId) {
  event.stopPropagation();
  const group = groupsData.find(g => g.name === groupName);
  const team = group.teams.find(t => t.id === teamId);
  const pr = rankingsData[teamId] || {};

  const advPct = pr.advance_pct || 50;
  const winGroupPct = advPct * 0.45;

  const winGroupOdds = formatOdds(probToAmerican(winGroupPct));
  const qualifyOdds  = formatOdds(probToAmerican(advPct));

  // Store pending action
  window._pendingBetActions = {
    pick1st: () => { setGroupPick(groupName, team, 'first'); },
    pick2nd: () => { setGroupPick(groupName, team, 'second'); },
    pick3rd: () => { setGroupPick(groupName, team, 'third'); },
    clear:   () => { clearGroupPick(groupName, teamId); },
  };

  const picks = groupPicks[groupName] || {};
  const hasPick = picks.first?.id === teamId || picks.second?.id === teamId || picks.third?.id === teamId;

  document.getElementById('popup-title').textContent = `${flag(team.country_code)} ${team.name}`;
  document.getElementById('popup-options').innerHTML = `
    <div class="bet-option" onclick="window._pendingBetActions.pick1st();hideBetPopup()">
      <div><div class="bet-option-label">Pick as 1st · Win Group</div><div style="font-size:0.65rem;color:var(--muted)">Group winner bet</div></div>
      <div class="bet-option-odds">${winGroupOdds}</div>
    </div>
    <div class="bet-option" onclick="window._pendingBetActions.pick2nd();hideBetPopup()">
      <div><div class="bet-option-label">Pick as 2nd · Advance</div><div style="font-size:0.65rem;color:var(--muted)">Qualify bet</div></div>
      <div class="bet-option-odds">${qualifyOdds}</div>
    </div>
    <div class="bet-option" onclick="window._pendingBetActions.pick3rd();hideBetPopup()">
      <div><div class="bet-option-label">Pick as 3rd Place</div><div style="font-size:0.65rem;color:var(--muted)">Potential best 3rd</div></div>
    </div>
    ${hasPick ? `<div class="bet-option" onclick="window._pendingBetActions.clear();hideBetPopup()" style="border-top:1px solid var(--border);margin-top:0.25rem">
      <div class="bet-option-label" style="color:var(--red)">Clear pick</div>
    </div>` : ''}
  `;

  // Position popup near click
  const x = Math.min(event.clientX + 10, window.innerWidth - 230);
  const y = Math.min(event.clientY + 10, window.innerHeight - 220);
  const popup = document.getElementById('bet-popup');
  popup.style.left = x + 'px';
  popup.style.top  = y + 'px';
  popup.style.display = 'block';

  setTimeout(() => document.addEventListener('click', hideBetPopup, {once:true}), 50);
}

function setGroupPick(groupName, team, slot) {
  if (!groupPicks[groupName]) groupPicks[groupName] = {};
  const picks = groupPicks[groupName];

  // Remove team from other slots
  if (picks.first?.id === team.id) delete picks.first;
  if (picks.second?.id === team.id) delete picks.second;
  if (picks.third?.id === team.id) delete picks.third;

  picks[slot] = team;
  hideBetPopup();

  // Re-render group card
  const group = groupsData.find(g => g.name === groupName);
  const card = document.getElementById(`group-card-${groupName}`);
  if (card) card.outerHTML = renderGroupCard(group);

  checkGroupsComplete();
}

function clearGroupPick(groupName, teamId) {
  if (!groupPicks[groupName]) return;
  const picks = groupPicks[groupName];
  if (picks.first?.id === teamId) delete picks.first;
  if (picks.second?.id === teamId) delete picks.second;
  if (picks.third?.id === teamId) delete picks.third;
  hideBetPopup();
  const group = groupsData.find(g => g.name === groupName);
  const card = document.getElementById(`group-card-${groupName}`);
  if (card) card.outerHTML = renderGroupCard(group);
}

function checkGroupsComplete() {
  const pickedCount = groupsData.filter(g => {
    const picks = groupPicks[g.name] || {};
    return picks.first && picks.second;
  }).length;

  const thirdCount = groupsData.filter(g => {
    const picks = groupPicks[g.name] || {};
    return picks.third;
  }).length;

  const pickedEl = document.getElementById('groups-picked-count');
  const thirdEl  = document.getElementById('third-tagged-count');

  if (pickedEl) {
    pickedEl.textContent = `${pickedCount}/12`;
    pickedEl.style.color = pickedCount === 12 ? 'var(--green)' : 'var(--teal)';
  }
  if (thirdEl) {
    thirdEl.textContent = `${thirdCount}/12`;
    thirdEl.style.color = thirdCount === 12 ? 'var(--teal)' : 'var(--muted)';
  }

  if (pickedCount === 12) {
    unlockPhase('third');
    const btn = document.getElementById('build-parlay-btn');
    if (btn) btn.style.display = 'block';
  }
}

function goToThird() {
  unlockPhase('third');
  renderThirdPlace();
  showPhase('third');
}

// ── THIRD PLACE ───────────────────────────────────────────────────────────────
function renderThirdPlace() {
  // Get all third-place picks + unpicked teams as potential 3rds
  const thirdTeams = groupsData.map(g => {
    const picks = groupPicks[g.name] || {};
    return picks.third || null;
  }).filter(Boolean);

  // Also include any teams not picked as 1st or 2nd
  const allThirds = groupsData.map(g => {
    const picks = groupPicks[g.name] || {};
    // find team not picked as 1st or 2nd
    const team = picks.third || g.teams.find(t =>
      t.id !== picks.first?.id && t.id !== picks.second?.id
    );
    return team ? {...team, group: g.name} : null;
  }).filter(Boolean);

  const el = document.getElementById('phase-third');
  el.innerHTML = `
    <div style="margin-bottom:1rem">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.05em;color:var(--text)">Best 3rd Place Teams</div>
      <div style="font-size:0.78rem;color:var(--muted);margin-top:0.25rem">Select 8 teams you think will advance as best 3rd place finishers.</div>
    </div>
    <div class="third-place-section">
      <div class="third-place-header">
        <span class="third-place-title">Select 8 of 12 Third-Place Teams</span>
        <span class="third-place-count" id="third-count">${thirdPicks.length}/8 selected</span>
      </div>
      <div class="third-place-grid">
        ${allThirds.map(t => {
          const pr = rankingsData[t.id] || {};
          const isSelected = thirdPicks.includes(t.id);
          const isLocked = !isSelected && thirdPicks.length >= 8;
          return `
            <div class="third-place-card ${isSelected?'selected':''} ${isLocked?'locked-out':''}"
                 onclick="toggleThird('${t.id}', '${t.name}', '${t.country_code}', '${t.group}')">
              <span class="third-place-flag">${flag(t.country_code)}</span>
              <span class="third-place-name">${t.name}</span>
              <span class="third-place-group">3rd ${t.group}</span>
            </div>
          `;
        }).join('')}
      </div>
    </div>
    <div style="margin-top:1.5rem;display:flex;justify-content:flex-end">
      <button onclick="goToR32()" style="background:var(--teal);color:#08111a;border:none;padding:0.75rem 2rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase">
        Build Bracket →
      </button>
    </div>
  `;
}

function toggleThird(teamId, teamName, countryCode, group) {
  const pr = rankingsData[teamId] || {};
  const idx = thirdPicks.indexOf(teamId);
  if (idx >= 0) {
    thirdPicks.splice(idx, 1);
  } else {
    if (thirdPicks.length >= 8) return;
    thirdPicks.push(teamId);
  }

  document.getElementById('third-count').textContent = `${thirdPicks.length}/8 selected`;
  renderThirdPlace();
}

function goToR32() {
  unlockPhase('r32');
  renderKnockout('r32');
  showPhase('r32');
}

// ── KNOCKOUT ROUNDS ───────────────────────────────────────────────────────────
function resolveTeam(slot) {
  if (!slot) return null;
  if (slot.type === 'winner') {
    return groupPicks[slot.group]?.first || null;
  }
  if (slot.type === 'runner-up') {
    return groupPicks[slot.group]?.second || null;
  }
  if (slot.type === 'best3rd') {
    // Find any selected 3rd place team from one of the eligible groups
    for (const g of slot.groups) {
      const team = groupPicks[g]?.third;
      if (team && thirdPicks.includes(team.id)) return team;
    }
    // Fallback: find any 3rd pick from eligible groups
    for (const g of slot.groups) {
      const picks = groupPicks[g] || {};
      const t = picks.third || groupsData.find(gd=>gd.name===g)?.teams?.find(t=>
        t.id !== picks.first?.id && t.id !== picks.second?.id
      );
      if (t && thirdPicks.includes(t.id)) return t;
    }
    return null;
  }
  // For knockout rounds — look up previous match winner
  return knockoutPicks[slot] || null;
}

function renderKnockout(phase) {
  const phaseConfig = {
    r32: {matches: R32_MATCHES, title: 'Round of 32', next: 'r16', nextLabel: 'Round of 16'},
    r16: {matches: R16_MATCHES, title: 'Round of 16', next: 'qf', nextLabel: 'Quarterfinals'},
    qf:  {matches: QF_MATCHES,  title: 'Quarterfinals', next: 'sf', nextLabel: 'Semifinals'},
    sf:  {matches: SF_MATCHES,  title: 'Semifinals', next: 'final', nextLabel: 'Final'},
    final: {matches: [FINAL_MATCH], title: 'Final', next: null},
  };

  const cfg = phaseConfig[phase];
  const el = document.getElementById(`phase-${phase}`);

  const matchesHtml = cfg.matches.map(match => {
    const homeTeam = phase === 'r32' ?
      resolveTeam(match.home) :
      knockoutPicks[match.home] || null;
    const awayTeam = phase === 'r32' ?
      resolveTeam(match.away) :
      knockoutPicks[match.away] || null;

    const winner = knockoutPicks[match.id];

    const renderTeamRow = (team, isHome) => {
      if (!team) return `<div class="bracket-team tbd"><span class="bracket-team-flag">?</span><span class="bracket-team-name">TBD</span></div>`;
      const pr = rankingsData[team.id] || {};
      const isWinner = winner?.id === team.id;
      const pctMap = {r32: pr.advance_pct, r16: pr.qf_pct, qf: pr.semi_pct, sf: pr.final_pct, final: pr.win_pct};
      const pct = pctMap[phase];
      const odds = formatOdds(probToAmerican(pct));
      const phaseLabels = {r32:'Advance to R16', r16:'Reach QF', qf:'Reach Semis', sf:'Reach Final', final:'Win World Cup'};
      return `
        <div class="bracket-team ${isWinner ? 'winner' : ''}" style="display:flex;align-items:center">
          <div style="flex:1;display:flex;align-items:center;gap:0.5rem;padding:0.45rem 0.6rem;cursor:pointer"
               onclick="pickKnockoutWinner('${phase}', '${match.id}', '${team.id}')">
            <span class="bracket-team-flag">${flag(team.country_code)}</span>
            <span class="bracket-team-name">${team.name}</span>
            <span class="bracket-team-rating">${pr.power_rating?.toFixed(1)||'—'}</span>
          </div>
          <button onclick="event.stopPropagation();addToSlip('${team.id}-${phase}',{id:'${team.id}',name:'${team.name}',country_code:'${team.country_code}'},'${flag(team.country_code)}','${phaseLabels[phase]}','${odds}',${probToAmerican(pct)||0})"
            style="background:none;border:none;border-left:1px solid var(--border);color:var(--teal);width:28px;height:100%;font-size:0.9rem;cursor:pointer;padding:0 0.4rem;flex-shrink:0;transition:background 0.15s"
            onmouseover="this.style.background='var(--teal-dim)'" onmouseout="this.style.background='none'">+</button>
        </div>
      `;
    };

    return `
      <div style="margin-bottom:0.75rem">
        <div style="font-size:0.65rem;color:var(--muted);margin-bottom:0.3rem;letter-spacing:0.06em;text-transform:uppercase">${match.label||match.id}</div>
        <div class="bracket-match">
          ${renderTeamRow(homeTeam, true)}
          ${renderTeamRow(awayTeam, false)}
        </div>
      </div>
    `;
  }).join('');

  el.innerHTML = `
    <div style="margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap">
      <div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.05em;color:var(--text)">${cfg.title}</div>
        <div style="font-size:0.78rem;color:var(--muted);margin-top:0.25rem">Click a team to pick them as the winner. Use + to add to bet slip.</div>
      </div>
      <div style="display:flex;gap:0.5rem">
        <button onclick="autoFillKnockout('favorites')" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:0.75rem;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer">⭐ Auto Favorites</button>
        <button onclick="autoFillKnockout('simulate')" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:0.75rem;padding:0.4rem 0.8rem;border-radius:6px;cursor:pointer">🤖 Simulate</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem">
      ${matchesHtml}
    </div>
    ${cfg.next ? `
      <div style="margin-top:1.5rem;display:flex;justify-content:flex-end">
        <button onclick="goToPhase('${cfg.next}')"
          style="background:var(--teal);color:#08111a;border:none;padding:0.75rem 2rem;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:700;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase">
          Next: ${cfg.nextLabel} →
        </button>
      </div>` : `
      <div style="margin-top:2rem;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2rem;text-align:center">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--teal);letter-spacing:0.05em">
          ${knockoutPicks['final'] ? `🏆 ${knockoutPicks['final'].name} wins the World Cup!` : 'Pick the World Cup Winner'}
        </div>
        ${knockoutPicks['final'] ? `
          <div style="margin-top:1rem;font-size:0.85rem;color:var(--muted)">
            Your parlay has ${betSlip.length} legs. Check the bet slip for combined odds.
          </div>` : ''}
      </div>`}
  `;
}

function pickKnockoutWinner(phase, matchId, teamId) {
  const allTeams = groupsData.flatMap(g => g.teams);
  const team = allTeams.find(t => t.id === teamId);
  if (!team) return;

  knockoutPicks[matchId] = team;
  renderKnockout(phase);

  const nextPhase = {r32:'r16', r16:'qf', qf:'sf', sf:'final'}[phase];
  if (nextPhase) {
    const allPicked = (phase === 'r32' ? R32_MATCHES :
                       phase === 'r16' ? R16_MATCHES :
                       phase === 'qf' ? QF_MATCHES : SF_MATCHES)
      .every(m => knockoutPicks[m.id]);
    if (allPicked) unlockPhase(nextPhase);
  }
}

function goToPhase(phase) {
  unlockPhase(phase);
  renderKnockout(phase);
  showPhase(phase);
}

function hideBetPopup() {
  const popup = document.getElementById('bet-popup');
  if (popup) popup.style.display = 'none';
}

// ── BET SLIP ──────────────────────────────────────────────────────────────────
function addToSlip(id, team, teamFlag, desc, oddsStr, american) {
  // Remove existing leg for same team+event
  removeFromSlip(id);
  betSlip.push({id, team, teamFlag, desc, odds: american, oddsStr});
  renderSlip();
}

function removeFromSlip(id) {
  betSlip = betSlip.filter(l => l.id !== id);
  renderSlip();
}

function clearSlip() {
  betSlip = [];
  renderSlip();
}

function resetBracket() {
  if (!confirm('Reset all bracket picks and bet slip?')) return;
  groupPicks = {};
  thirdPicks = [];
  knockoutPicks = {};
  betSlip = [];
  window.slotOverrides = {};
  // Lock all phases except groups
  ['third','r32','r16','qf','sf','final'].forEach(p => {
    const tab = document.getElementById(`tab-${p}`);
    if (tab) tab.classList.add('locked');
  });
  renderSlip();
  showPhase('groups');
  renderGroups();
}

function autoFill(mode) {
  groupsData.forEach(g => {
    const teams = [...g.teams].map(t => ({
      ...t, pr: rankingsData[t.id]?.power_rating || 50
    }));

    let first, second, third;

    if (mode === 'favorites') {
      const sorted = teams.sort((a,b) => b.pr - a.pr);
      first = sorted[0]; second = sorted[1]; third = sorted[2];
    } else if (mode === 'simulate') {
      // Weighted random — probability proportional to power rating
      const pick = (pool) => {
        const total = pool.reduce((s,t) => s + t.pr, 0);
        let r = Math.random() * total;
        for (const t of pool) { r -= t.pr; if (r <= 0) return t; }
        return pool[0];
      };
      first  = pick(teams);
      second = pick(teams.filter(t => t.id !== first.id));
      third  = pick(teams.filter(t => t.id !== first.id && t.id !== second.id));
    } else { // random
      const shuffled = [...teams].sort(() => Math.random() - 0.5);
      first = shuffled[0]; second = shuffled[1]; third = shuffled[2];
    }

    groupPicks[g.name] = { first, second, third };
  });

  renderGroups();
  checkGroupsComplete();
}

function autoFillKnockout(mode) {
  // Auto-pick winners for current knockout phase
  const phaseMatches = {
    r32: R32_MATCHES, r16: R16_MATCHES, qf: QF_MATCHES,
    sf: SF_MATCHES, final: [FINAL_MATCH]
  };
  const matches = phaseMatches[currentPhase];
  if (!matches) return;

  matches.forEach(match => {
    const allTeams = groupsData.flatMap(g => g.teams);
    const homeTeam = currentPhase === 'r32' ? resolveTeam(match.home) : knockoutPicks[match.home];
    const awayTeam = currentPhase === 'r32' ? resolveTeam(match.away) : knockoutPicks[match.away];
    if (!homeTeam || !awayTeam) return;

    const homePr = rankingsData[homeTeam.id]?.power_rating || 50;
    const awayPr = rankingsData[awayTeam.id]?.power_rating || 50;

    let winner;
    if (mode === 'favorites') {
      winner = homePr >= awayPr ? homeTeam : awayTeam;
    } else {
      const r = Math.random() * (homePr + awayPr);
      winner = r < homePr ? homeTeam : awayTeam;
    }
    knockoutPicks[match.id] = winner;
  });

  renderKnockout(currentPhase);
  const nextPhase = {r32:'r16', r16:'qf', qf:'sf', sf:'final'}[currentPhase];
  if (nextPhase) unlockPhase(nextPhase);
}

function toggleSlip() {
  document.getElementById('slip-col').classList.toggle('expanded');
}

function renderSlip() {
  const legsEl = document.getElementById('slip-legs');
  const countEl = document.getElementById('slip-count');
  const copyBtn = document.getElementById('slip-copy-btn');

  countEl.textContent = betSlip.length;
  copyBtn.disabled = betSlip.length === 0;

  if (!betSlip.length) {
    legsEl.innerHTML = '<div style="color:var(--muted);font-size:0.78rem;white-space:nowrap;padding:0.5rem">Pick teams to add bets</div>';
    document.getElementById('slip-combined-header').textContent = '';
    document.getElementById('slip-payout-header').textContent = '';
    document.getElementById('slip-odds-total').textContent = '—';
    document.getElementById('slip-payout-total').textContent = '—';
    return;
  }

  legsEl.innerHTML = betSlip.map(leg => `
    <div class="slip-leg">
      <button class="slip-leg-remove" onclick="event.stopPropagation();removeFromSlip('${leg.id}')">✕</button>
      <div class="slip-leg-team">${leg.teamFlag} ${leg.team.name}</div>
      <div class="slip-leg-desc">${leg.desc}</div>
      ${leg.oddsStr && leg.oddsStr !== '—' ? `<div class="slip-leg-odds">${leg.oddsStr}</div>` : ''}
    </div>
  `).join('');

  const legsWithOdds = betSlip.filter(l => l.odds);
  const combined = combinedOdds(legsWithOdds);
  const combinedStr = combined ? formatOdds(combined) : '—';

  let payout = '—';
  if (combined) {
    const p = combined < 0 ? 100/(-combined) : combined/100;
    payout = `$${(100 * p + 100).toFixed(0)}`;
  }

  document.getElementById('slip-combined-header').textContent = combinedStr !== '—' ? combinedStr : '';
  document.getElementById('slip-payout-header').textContent = payout !== '—' ? `$100 → ${payout}` : '';
  document.getElementById('slip-odds-total').textContent = combinedStr;
  document.getElementById('slip-payout-total').textContent = payout;
}

function copySlip() {
  const lines = betSlip.map(l => `${l.teamFlag} ${l.team.name} — ${l.desc} ${l.oddsStr || ''}`);
  const combined = combinedOdds(betSlip.filter(l => l.odds));
  lines.push('');
  lines.push(`Parlay Odds: ${combined ? formatOdds(combined) : '—'}`);
  lines.push('Built at wc2026-orpin.vercel.app');
  navigator.clipboard.writeText(lines.join('\n'));

  const btn = document.getElementById('slip-copy-btn');
  btn.textContent = '✓ Copied!';
  setTimeout(() => btn.textContent = '📋 Copy Parlay', 2000);
}

init();
</script>
